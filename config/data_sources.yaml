    descricao: "Votacao por secao eleitoral - Eleicoes Municipais 2024. Baixado e convertido SOB DEMANDA por UF (ver src/uf_data_bootstrap.py) - nao ha um arquivo_local fixo aqui; o caminho e data/raw/votacao_secao_2024_{UF}.parquet, resolvido a partir da UF da candidatura."
