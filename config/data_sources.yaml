mte:
  rais_estabelecimentos:
    descricao: >
      RAIS Estabelecimentos - agregado por municipio (vinculos formais
      ativos/CLT, estabelecimentos ativos), Brasil inteiro. Nivel:
      MUNICIPIO (a base original tem CNAE por estabelecimento, mas nao tem
      distrito/bairro fora de SP capital - por isso o agregado usado aqui
      e municipal, mostrado como contexto economico, nao como variavel de
      regressao territorial dentro do municipio).
    fonte: "Ministerio do Trabalho e Emprego - RAIS (microdados nao identificados, dados publicos)"
    ano: 2023
    arquivo_local: "data/raw/rais_municipio_2023_BR.parquet"
    arquivo_bruto_estabelecimento: "data/raw/rais_estabelecimentos_BR.parquet"
    url_padrao: "ftp://ftp.mtps.gov.br/pdet/microdados/RAIS/2023/RAIS_ESTAB_PUB.7z"
    observacao: >
      Codigo de municipio da RAIS e o codigo IBGE de 7 digitos SEM o
      digito verificador final (ex.: Sao Paulo capital = 3550308 (IBGE) ->
      355030 (RAIS)). Conversao feita em src/economic_analysis.py. Os 6
      primeiros digitos do codigo IBGE ja identificam o municipio de forma
      unica em todo o Brasil (o 7o digito e apenas verificador) - sem
      risco de colisao entre municipios de UFs diferentes.

  caged:
    descricao: >
      Novo CAGED - saldo de admissoes/desligamentos formais, consolidado
      para o ano de 2024 (12 meses), agregado por municipio, Brasil
      inteiro. Mesmo nivel de granularidade (municipio) e mesma ressalva
      da RAIS Estabelecimentos.
    fonte: "Ministerio do Trabalho e Emprego - Novo CAGED (dados publicos, movimentacao nao identificada)"
    ano: 2024
    arquivo_local: "data/raw/caged_saldo_2024_BR.parquet"
    url_padrao: "ftp://ftp.mtps.gov.br/pdet/microdados/NOVO%20CAGED/2024/{mes}/CAGEDMOV{mes}.7z"

# Familias de variaveis explicitamente EXCLUIDAS do uso automatico (secao 4 do
# briefing): variaveis genericas de caracteristicas do domicilio (dom1/dom2/dom3)
# nao possuem identificacao clara suficiente para uso automatico.
variaveis_excluidas_automaticamente:
  - "Agregados_por_setores_caracteristicas_domicilio1_BR.zip"

