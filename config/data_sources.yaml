    url_padrao: "https://cdn.tse.jus.br/estatistica/sead/odsele/consulta_cand/consulta_cand_2024.zip"
    observacao: "O zip oficial contem um CSV por UF mais um consulta_cand_2024_BRASIL.csv ja combinado - usado aqui. Arquivo leve (~12MB), permite descobrir em qual(is) UF(s) um numero de candidato foi registrado antes de baixar os votos daquele estado."

